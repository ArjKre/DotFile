source = ~/.config/omarchy/current/theme/hyprlock.conf

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
    blur_passes = 3
    blur_size = 1
    brightness = 0.55
    contrast = 0.9
    vibrancy = 0.2

}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 550, 90
    position = 0, 250
    halign = center
    valign = bottom

    # inner_color = $inner_color
    # outer_color = $outer_color
    # outline_thickness = 4
    #
    inner_color = rgba(0,0,0,0)
    outline_thickness = 0

    font_family = CaskaydiaMono Nerd Font
    font_color = $font_color

    placeholder_text =
    check_color = $check_color
    fail_text = <i>$PAMFAIL ($ATTEMPTS)</i>

    rounding = 1
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = true
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B %Y')" </b>"
    color = rgba(242, 243, 244, 0.75)
    font_size = 34
    font_family = SF Pro Display Bold
    position = 0, -175
    halign = center
    valign = top
}

#Time
label{
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = rgba(242, 243, 244, 0.75)
    font_size = 175
    font_family = SF Pro Display Bold
    position = 0, -200
    halign = center
    valign = top
  }

#Weather label
label {
   monitor =
   text = cmd[update:1800000] cat /tmp/weather_cache.txt   
   color = rgba(242, 243, 244, 0.55)
   font_size = 27
   font_family = SF Pro Display Bold
   position = 0, -435  # Adjust position as needed
   halign = center
   valign = top
}

